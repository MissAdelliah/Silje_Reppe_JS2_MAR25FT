<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comit</title>

    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="./js/index.js" defer></script>
  </head>

  <body class="page--white">
    <header>
      <nav class="nav" aria-label="Main navigation">
        <a class="nav__brand" href="/index.html">
          <img class="nav__logo" src="./logo/logo.png" alt="Comit logo" />
        </a>
        <button
          class="nav__button--hamburger"
          id="nav-menu-btn"
          type="button"
          aria-label="Menu"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <img src="./icons/menu.png" alt="" aria-hidden="true" />
        </button>
      </nav>
      <div class="nav-dropdown" id="nav-dropdown" hidden></div>
    </header>
    <main class="feed">
      <section class="feed-controls" aria-label="Filter posts">
        <div class="feed-controls__row">
          <h3 class="feed-controls__title">Filter</h3>

          <nav
            class="filter-buttons"
            id="tag-nav"
            aria-label="Tag filters"
          ></nav>
        </div>
      </section>
    </main>
    <footer class="footer">
      <div class="footer__middle">
        <a class="nav__brand" href="#/">
          <img
            class="nav__logo"
            src="./logo/logo.png"
            alt="Brand the comit logo "
          />
        </a>
        <p>Terms & conditions</p>
        <p>Contact us</p>
        <p>comitsupport@gmail.com</p>
        <div class="footer__icons">
          <img src="./icons/insta.png" alt="Instagram" />
          <img src="./icons/tiktok.png" alt="Instagram" />
          <img src="./icons/facebook.png" alt="Instagram" />
        </div>
        <p class="website__rights--text">&copy; 2026 COMIT</p>
      </div>
    </footer>
  </body>
</html>
