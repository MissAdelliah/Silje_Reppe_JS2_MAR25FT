<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comit</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script type="module" src="../js/index.js" defer></script>
  </head>
  <body>
    <main class="profile-page">
      <section class="profile-card">
        <img class="profile-card__avatar" src="" alt="Profile avatar" />
        <div class="profile-card__info">
          <h1 class="profile-card__name"></h1>
          <p class="profile-card__stats"></p>
          <p class="profile-card__bio"></p>
        </div>

        <button class="btn btn--secondary" id="follow-btn" type="button" hidden>
          Follow
        </button>
      </section>

      <h2 class="profile-title">Activity</h2>

      <a
        class="create-shortcut"
        href="../post/create.html"
        aria-label="Create post"
      >
        +
      </a>

      <section id="profile-posts" class="post-list">
        <p class="status">Loading posts...</p>
      </section>
    </main>
  </body>
</html>
