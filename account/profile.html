<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comit</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script type="module" src="../js/index.js" defer></script>
  </head>
  <body>
    <main class="profile">
      <section class="search_bar">
        <input type="text" placeholder="Search Topic, Profile, Repo" />
      </section>
      <section class="profile__card">
        <img class="profile__avatar" src="avatar.jpg" alt="User avatar" />

        <div class="profile__info">
          <h3 class="profile__name">Bot_Nicholas</h3>
          <p class="profile__bio">Owner of codework - Fullstack dev</p>
          <p class="profile__stats">1k followers · 364 following</p>
          <button class="btn btn--follow">Follow</button>
        </div>
      </section>
      <section class="profile__tabs">
        <button class="tab active">Posts</button>
        <button class="tab">Contributions</button>
      </section>
      <section class="profile__posts">
        <article class="post-card">
          <div class="post-card__header">
            <img src="avatar.jpg" alt="" />
            <span>Bot_Nicholas</span>
            <span class="post-time">11:33 am</span>
          </div>

          <p class="post-card__text">Text here...</p>

          <img class="post-card__image" src="post.jpg" alt="" />

          <div class="post-card__actions">
            <button>Like</button>
            <button>Comment</button>
            <button>Contribute</button>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
