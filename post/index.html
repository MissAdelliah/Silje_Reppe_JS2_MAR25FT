<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comit</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script type="module" src="../js/index.js" defer></script>
  </head>
  <body class="page--white">
    <main class="feed">
      <section class="feed-search" aria-label="Search posts">
        <input
          id="search-input"
          class="feed-search__input"
          type="search"
          placeholder="Search Topic, Profile..."
        />
      </section>

      <section id="post-list" class="post-list">
        <p class="status">Loading posts...</p>
      </section>
      <section class="feed__contributors">
        <h3>Top contributors</h3>
        <div class="contributors__list">
          <img src="../images/img1.jpg" alt="model" />
          <img
            src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=1160&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="model"
          />
          <img
            src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="model"
          />
          <img
            src="https://images.unsplash.com/photo-1528892952291-009c663ce843?q=80&w=688&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="model"
          />
          <img
            src="https://images.unsplash.com/photo-1581403341630-a6e0b9d2d257?q=80&w=774&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="model"
          />
          <span>+5</span>
        </div>
      </section>
      <section class="post-topics" aria-label="Post topics">
        <h2 class="section-title">Post Topics</h2>
        <p>If I started from scratch I would...</p>
        <p>I wrote an article about...</p>
        <p>Did I just accidentally develop a new..</p>
      </section>

      <section class="feed__section">
        <h3>New</h3>
        <section class="feed-controls" aria-label="Filter posts">
          <div class="feed-controls__row">
            <h3 class="feed-controls__title">Filter</h3>

            <nav class="filter-buttons" id="tag-nav" aria-label="Tag filters">
              <!-- JS injects filter buttons here -->
            </nav>
          </div>
        </section>
        <p class="feed__hint">To contribute you need to log in</p>
        <div class="feed__grid">
          <article class="post-card"></article>
          <article class="post-card"></article>
        </div>
      </section>
    </main>
  </body>
</html>
