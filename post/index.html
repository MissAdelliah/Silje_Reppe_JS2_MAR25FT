<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Comit social media feed." />
    <title>Feed | Comit</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script type="module" src="../js/index.js" defer></script>
  </head>

  <body class="page--white">
    <header class="feed-header">
      <a class="feed-header__brand" href="../index.html">
        <img
          class="feed-header__logo"
          src="../icons/logo.png"
          alt="Comit logo"
        />
        <span class="feed-header__title">Comit</span>
      </a>

      <a class="feed-header__login" href="../account/register.html">
        <img src="../icons/register.png" alt="Register or log in" />
      </a>
    </header>

    <main class="feed">
      <section class="feed-search" aria-label="Search posts">
        <input
          id="search-input"
          class="feed-search__input"
          type="search"
          placeholder="Search Topic, Profile..."
        />
      </section>

      <section class="feed-top">
        <h2>Top contributors</h2>
        <div class="contributors">
          <img src="https://placehold.co/32x32" alt="" />
          <img src="https://placehold.co/32x32" alt="" />
          <img src="https://placehold.co/32x32" alt="" />
          <span>+5</span>
        </div>
      </section>

      <section class="post-topics">
        <h2>Post Topics</h2>
        <p>If I started from scratch I would...</p>
        <p>I wrote an article about...</p>
        <p>Did I just accidentally develop a new...</p>
      </section>

      <section class="feed-posts">
        <h2>Following</h2>
        <p class="feed-hint" id="following-message"></p>
        <section id="following-post-list" class="post-list"></section>
      </section>

      <section class="feed-posts">
        <h2>All posts</h2>

        <section class="feed-filter" aria-label="Filter posts">
          <h3 class="feed-filter__title">Filter posts :</h3>

          <div class="feed-filter__buttons">
            <button
              class="filter-btn filter-btn--active"
              type="button"
              data-tag=""
            >
              All
            </button>
            <button class="filter-btn" type="button" data-tag="JavaScript">
              JavaScript
            </button>
            <button class="filter-btn" type="button" data-tag="Python">
              Python
            </button>
            <button class="filter-btn" type="button" data-tag="C++">C++</button>
            <button class="filter-btn" type="button" data-tag="Bugs">
              Bugs
            </button>
            <button class="filter-btn" type="button" data-tag="Memes">
              Memes
            </button>
          </div>
        </section>

        <section id="all-post-list" class="post-list">
          <p class="status">Loading posts...</p>
        </section>
      </section>
    </main>
  </body>
</html>
