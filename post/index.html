<main class="feed">
  <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comit</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script type="module" src="./js/index.js" defer></script>
  </head>
  <body class="page--white">
  <section class="feed__search">
    <input type="text" placeholder="Search Topic, Profile, Repo" />
  </section>
  <section class="feed__contributors">
    <h3>Top contributors</h3>
    <div class="contributors__list">
      <img src="../images/img1.jpg" alt="" />
      <img src="avatar.jpg" alt="" />
      <img src="avatar.jpg" alt="" />
      <span>+5</span>
    </div>
  </section>
  <section class="feed__section">
    <h3>Rising</h3>
    <div class="feed__grid">
      <article class="post-card"></article>
      <article class="post-card"></article>
    </div>
  </section>
  <section class="feed__section">
    <h3>New</h3>
    <p class="feed__hint">To contribute you need to log in</p>
    <div class="feed__grid">
      <article class="post-card"></article>
      <article class="post-card"></article>
    </div>
  </section>
  <section class="feed__section">
    <h3>I need help</h3>
    <p class="feed__hint">To contribute you need to log in</p>

    <div class="feed__grid">
      <article class="post-card"></article>
      <article class="post-card"></article>
    </div>
  </section>
</main>
