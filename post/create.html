<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create post | Comit</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script type="module" src="../js/create.js" defer></script>
  </head>

  <body class="page--white">
    <header class="create-header">
      <a class="create-header__brand" href="./index.html">
        <img
          class="create-header__logo"
          src="../icons/logo.png"
          alt="Comit logo"
        />
        <span>Comit</span>
      </a>

      <a class="create-header__profile" href="../account/profile.html">
        <img
          id="header-avatar"
          src="https://placehold.co/40x40?text=U"
          alt="Profile avatar"
        />
      </a>
      <nav class="feed-header__nav" aria-label="Feed navigation">
        <button
          class="feed-header__menu-btn"
          id="feed-menu-btn"
          type="button"
          aria-label="Open menu"
          aria-expanded="false"
          hidden
        >
          ...
        </button>

        <a
          class="feed-header__login"
          id="feed-login-link"
          href="../account/register.html"
        >
        </a>
        <div class="feed-header__dropdown" id="feed-dropdown" hidden>
          <button type="button" id="logout-btn">Log out</button>
        </div>
      </nav>
    </header>

    <main class="create-page">
      <form id="create-form" class="create-form">
        <label class="create-form__label" for="title">Topic</label>
        <input
          class="create-form__input"
          id="title"
          name="title"
          type="text"
          placeholder="Write topic here"
          required
          maxlength="280"
        />

        <label class="create-form__label" for="body">Text</label>
        <textarea
          class="create-form__textarea"
          id="body"
          name="body"
          placeholder="Write text here"
          rows="7"
          maxlength="280"
        ></textarea>

        <label class="create-form__label" for="mediaUrl">Image URL</label>
        <input
          class="create-form__input"
          id="mediaUrl"
          name="mediaUrl"
          type="url"
          placeholder="Paste image URL"
        />

        <img
          class="create-form__preview"
          id="media-preview"
          src="https://placehold.co/600x300?text=Post+image"
          alt="Post image preview"
        />

        <label class="create-form__label" for="tags">Tags</label>
        <input
          class="create-form__input create-form__input--small"
          id="tags"
          name="tags"
          type="text"
          placeholder="JavaScript, Bugs"
        />

        <p class="message" id="message"></p>

        <button class="btn btn--primary create-form__submit" type="submit">
          Publish
        </button>
      </form>
    </main>
  </body>
</html>
