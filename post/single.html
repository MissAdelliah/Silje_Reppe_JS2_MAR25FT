<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="View a single Comit post." />
    <title>Post | Comit</title>

    <link rel="stylesheet" href="../css/style.css" />
    <script type="module" src="../js/single.js" defer></script>
  </head>

  <body class="page--white">
    <header class="feed-header">
      <a class="feed-header__brand" href="../index.html">
        <img
          class="feed-header__logo"
          src="../icons/logo.png"
          alt="Comit logo"
        />
        <span class="feed-header__title">Comit</span>
      </a>

      <nav class="feed-header__nav" aria-label="Feed navigation">
        <button
          class="feed-header__menu-btn"
          id="feed-menu-btn"
          type="button"
          aria-label="Open menu"
          aria-expanded="false"
          hidden
        >
          ...
        </button>

        <a
          class="feed-header__login"
          id="feed-login-link"
          href="../account/register.html"
        >
          <img src="../icons/register.png" alt="Register or log in" />
        </a>

        <div class="feed-header__dropdown" id="feed-dropdown" hidden>
          <a href="./index.html">Feed</a>
          <a href="./create.html">Create</a>
          <a href="../account/profile.html">Profile</a>
          <button type="button" id="logout-btn">Log out</button>
        </div>
      </nav>
    </header>
    <main class="single-page">
      <section class="single-author-card" id="author-card">
        <a class="single-author-card__avatar-link" href="#">
          <img
            class="single-author-card__avatar"
            src="https://placehold.co/60x60?text=U"
            alt="Author avatar"
          />
        </a>

        <div class="single-author-card__info">
          <a class="single-author-card__name" href="#">Loading...</a>
          <p class="single-author-card__bio"></p>
          <p class="single-author-card__stats"></p>

          <button
            class="btn follow__btn single-author-card__follow"
            id="follow-btn"
            type="button"
            hidden
          >
            Follow
          </button>
        </div>
      </section>

      <section id="single-post" class="single-post">
        <p class="status">Loading post...</p>
      </section>
    </main>
  </body>
</html>
